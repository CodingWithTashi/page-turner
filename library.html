<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Library — PageTurner</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Navbar -->
  <header>
    <nav class="navbar" >
      <div class="nav-inner">
        <a href="index.html" class="nav-logo">Page<span>Turner</span></a>
        <ul class="nav-links" role="list">
          <li><a href="index.html">Home</a></li>
          <li><a href="library.html">Library</a></li>
          <li><a href="community.html">Community</a></li>
        </ul>
      </div>
    </nav>
  </header>

  <main>
    <section class="section">

      <div class="section-header">
        <h2 id="library-heading">The Library</h2>
        <span id="result-count" aria-live="polite" style="font-size:0.82rem;color:var(--muted);"></span>
      </div>

      <!-- Search -->
      <div class="search-wrap">
        <span class="search-icon" aria-hidden="true">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </span>
        <input
          type="search"
          class="search-input"
          id="search-input"
          placeholder="Search by title or author&hellip;"
          autocomplete="off"
        />
      </div>

      <!-- Genre Filter
           Mobile:  horizontal-scroll pill bar
           Desktop: underline tab strip (see style.css for the drastic layout change)
      -->
      <div class="filter-bar" id="filter-bar" role="group" >
        <button class="filter-btn active" data-genre="All"         type="button">All</button>
        <button class="filter-btn"        data-genre="Fiction"     type="button">Fiction</button>
        <button class="filter-btn"        data-genre="Non-Fiction" type="button">Non-Fiction</button>
        <button class="filter-btn"        data-genre="Mystery"     type="button">Mystery</button>
        <button class="filter-btn"        data-genre="Sci-Fi"      type="button">Sci-Fi</button>
        <button class="filter-btn"        data-genre="Biography"   type="button">Biography</button>
      </div>

      <!-- Cards Grid (populated by gallery.js) -->
      <div class="cards-grid" id="cards-grid" aria-live="polite"></div>

      <!-- Empty State -->
      <div class="empty-state" id="empty-state" role="status">
        <div class="empty-state-icon" aria-hidden="true">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="1.5"
               stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </div>
        <h3>No books found</h3>
        <p>Try a different search term or select a different genre.</p>
      </div>

    </section>
  </main>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="footer-inner">
      <span class="footer-logo">Page<span>Turner</span></span>
      <p class="footer-copy">A curated portal for book lovers &mdash; &copy; 2026</p>
    </div>
  </footer>

  <script src="js/nav.js"></script>
  <script src="js/gallery.js"></script>

</body>
</html>
